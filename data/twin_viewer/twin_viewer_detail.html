        if(ind){it.i=gl.createBuffer();gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,it.i);gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,ind,gl.STATIC_DRAW)}
        meshes.push(it)
      }
    }
    for(const x of nd.children||[])rec(x,wm,bind)
  }
  for(const n of nodes)rec(n,M(),'');
  if(!meshes.length)throw Error('模型内没有网格');
  B.min=mi;B.max=ma;B.cen=[(mi[0]+ma[0])/2,(mi[1]+ma[1])/2,(mi[2]+ma[2])/2];B.r=Math.max(...sub(ma,mi).map(Math.abs))/2||1;
  for(const it of meshes){
    if(!it.visualKind&&it.box){
      let sx=it.box.max[0]-it.box.min[0],sy=it.box.max[1]-it.box.min[1],sz=it.box.max[2]-it.box.min[2];
      let dark=((it.color[0]||0)+(it.color[1]||0)+(it.color[2]||0))/3<0.26;
      let nearBottom=it.box.min[1]<=B.min[1]+B.r*0.22;
      let flat=sy<=B.r*0.20;
      let large=(sx*sz>=B.r*B.r*0.48)||((sx>B.r*1.05&&sz>B.r*0.42)||(sz>B.r*1.05&&sx>B.r*0.42));
      it.isBasePlate=!!(dark&&nearBottom&&flat&&large);
    }
  }
  for(const [code,b] of Object.entries(bindBoxes)){if(!anchors[code])anchors[code]=[(b.min[0]+b.max[0])/2,b.max[1]+B.r*0.12,(b.min[2]+b.max[2])/2]}
}

function dataFor(code){let k=N(code);return (state.pumps&&state.pumps[k])||(state.pipes&&state.pipes[k])||(state.meters&&state.meters[k])||(state.cameras&&state.cameras[k])||(state.tanks&&state.tanks[k])||null}
function statusFor(code){let d=dataFor(code);return d?normStatus(d.status||d.statusText):null}
function match(name,bind){let k=N(bind||name);let st=statusFor(k);if(st)return st;let nk=N(name);for(const group of[state.pumps,state.pipes,state.meters,state.cameras,state.tanks])for(const c of Object.keys(group||{}))if(nk==N(c)||nk.includes(N(c)))return normStatus(group[c].status||group[c].statusText);return null}

function getParamClass(value, min, max){
  if(value===undefined||value===null)return '';
  try{
    value=Number(value);
    if(min===undefined)min=0;
    if(max===undefined)max=100;
    let ratio=(value-min)/(max-min);
    if(ratio<0.2||ratio>0.85)return 'danger';
    if(ratio<0.35||ratio>0.75)return 'warn';
    return 'good';
  }catch(e){return ''}
}

function buildDetail(code){
  let d=dataFor(code)||{};
  let st=normStatus(d.status||d.statusText);
  document.getElementById('detail-icon').textContent=statusIcon(st);
  document.getElementById('detail-name').textContent=d.name||code;
  document.getElementById('selected-title').textContent='设备详情：'+(d.name||code);
  let badge=document.getElementById('detail-badge');
  badge.textContent=d.statusText||d.status||'-';
  badge.className='badge badge-'+st;
  let html='';
  html+='<div class="info-group"><h5>基本信息</h5>';
  html+=`<div class="info-row"><span class="label">设备代码</span><span class="value">${code}</span></div>`;
  html+=`<div class="info-row"><span class="label">设备名称</span><span class="value">${d.name||'-'}</span></div>`;
  html+=`<div class="info-row"><span class="label">设备类型</span><span class="value">${d.type||'-'}</span></div>`;
  html+=`<div class="info-row"><span class="label">当前状态</span><span class="value" style="color:${col(st).map(c=>Math.round(c*255)).join(',')}">${d.statusText||d.status||'-'}</span></div>`;
  html+=`<div class="info-row"><span class="label">安装位置</span><span class="value">${d.position||'-'}</span></div>`;
  html+='</div>';
  if(d.freq!==undefined){
    html+='<div class="info-group"><h5>运行参数</h5>';
    html+=`<div class="info-row"><span class="label">运行频率</span><span class="value num">${num(d.freq,1)}<span class="unit">Hz</span></span></div>`;
    html+=`<div class="param-bar"><div class="param-fill ${getParamClass(d.freq,0,50)}" style="width:${Math.min(100,(d.freq||0)/50*100)}%"></div></div>`;
    html+=`<div class="info-row"><span class="label">运行电流</span><span class="value num">${num(d.current,1)}<span class="unit">A</span></span></div>`;
    html+=`<div class="param-bar"><div class="param-fill ${getParamClass(d.current,0,100)}" style="width:${Math.min(100,(d.current||0)/100*100)}%"></div></div>`;
    html+=`<div class="info-row"><span class="label">运行电压</span><span class="value num">${num(d.voltage,1)}<span class="unit">V</span></span></div>`;
    html+=`<div class="info-row"><span class="label">运行功率</span><span class="value num">${num(d.power,2)}<span class="unit">kW</span></span></div>`;
    html+=`<div class="info-row"><span class="label">功率因数</span><span class="value num">${num(d.power_factor,2)}</span></div>`;
    html+=`<div class="info-row"><span class="label">运行时长</span><span class="value">${formatSeconds(d.run_seconds_today)}</span></div>`;
    html+='</div>';
  }
  if(d.flow!==undefined){
    html+='<div class="info-group"><h5>管道参数</h5>';
    html+=`<div class="info-row"><span class="label">瞬时流量</span><span class="value num">${num(d.flow,1)}<span class="unit">m³/h</span></span></div>`;
    html+=`<div class="param-bar"><div class="param-fill ${getParamClass(d.flow,0,1000)}" style="width:${Math.min(100,(d.flow||0)/1000*100)}%"></div></div>`;
    html+=`<div class="info-row"><span class="label">管道压力</span><span class="value num">${num(d.pressure,2)}<span class="unit">MPa</span></span></div>`;
    html+=`<div class="param-bar"><div class="param-fill ${getParamClass(d.pressure,0,2)}" style="width:${Math.min(100,(d.pressure||0)/2*100)}%"></div></div>`;
    html+=`<div class="info-row"><span class="label">管径规格</span><span class="value">${d.dn||'-'}</span></div>`;
    html+=`<div class="info-row"><span class="label">累计流量</span><span class="value num">${num(d.total_flow,2)}<span class="unit">m³</span></span></div>`;
    html+='</div>';
  }
  if(d.value!==undefined){
    html+='<div class="info-group"><h5>测量参数</h5>';
    html+=`<div class="info-row"><span class="label">测量数值</span><span class="value num">${num(d.value,2)}<span class="unit">${d.unit||''}</span></span></div>`;
    html+=`<div class="param-bar"><div class="param-fill ${getParamClass(d.value)}" style="width:${Math.min(100,((d.value||0)-0)/10*100)}%"></div></div>`;
    html+=`<div class="info-row"><span class="label">量程范围</span><span class="value">${d.range_min||0} ~ ${d.range_max||10} ${d.unit||''}</span></div>`;
    html+=`<div class="info-row"><span class="label">精度等级</span><span class="value">${d.accuracy||'-'}</span></div>`;
    html+='</div>';
  }
  if(d.camera_ip){

    html+=`<div class="info-row"><span class="label">端口</span><span class="value">${d.camera_port||'-'}</span></div>`;
    html+=`<div class="info-row"><span class="label">用户名</span><span class="value">${d.camera_user||'-'}</span></div>`;
    html+=`<div class="info-row"><span class="label">分辨率</span><span class="value">${d.resolution||'-'}</span></div>`;
    html+='</div>';
  }
  document.getElementById('detail-body').innerHTML=html;
}

function formatSeconds(sec){
  try{
    sec=Math.floor(Number(sec||0));
    let h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;
    if(h)return `${h}小时${m}分钟`;
    if(m)return `${m}分钟${s}秒`;
    return `${s}秒`;
  }catch(e){return '-'}
}

function buildDeviceList(){
  let codes=Object.keys(bindBoxes).filter(c=>c);
  let html='';
  for(const code of codes){
    let d=dataFor(code)||{};
    let st=normStatus(d.status||d.statusText);
    let sel=selectedCode===code?' sel':'';
    html+=`<div class="device-item${sel}" onclick="selectDevice('${code}')">`;
    html+=`<span class="code">${code}</span> `;
    html+=`<span class="status status-${st}">${d.statusText||d.status||'-'}</span>`;
    html+='</div>';
  }
  document.getElementById('device-list').innerHTML=html;
}

function updateMinimap(){
  let mm=document.getElementById('minimap');
  let ctx=mm.getContext('2d');
  let w=mm.width,h=mm.height;
  ctx.fillStyle='#06101e';
  ctx.fillRect(0,0,w,h);
  ctx.strokeStyle='rgba(68,188,255,0.15)';
  ctx.lineWidth=1;
  for(let i=0;i<10;i++){ctx.beginPath();ctx.moveTo(i*w/10,0);ctx.lineTo(i*w/10,h);ctx.stroke()}
  for(let i=0;i<6;i++){ctx.beginPath();ctx.moveTo(0,i*h/6);ctx.lineTo(w,i*h/6);ctx.stroke()}
  let bx=B.min,by=B.max,bz=B.max;
  for(const [code,box] of Object.entries(bindBoxes)){
    let cx=(box.min[0]+box.max[0])/2,cz=(box.min[2]+box.max[2])/2;
    let sx=Math.max(0.001,box.max[0]-box.min[0]),sz=Math.max(0.001,box.max[2]-box.min[2]);
    let px=(cx-bx[0])/(by[0]-bx[0])*w;
    let py=(bz[2]-cz)/(bz[2]-bx[2])*h;
    let r=Math.max(6,Math.min(16,Math.max(sx,sz)/(by[0]-bx[0])*w));
    let d=dataFor(code)||{};
    let st=normStatus(d.status||d.statusText);
    let c=col(st);
    ctx.fillStyle=`rgba(${Math.round(c[0]*255)},${Math.round(c[1]*255)},${Math.round(c[2]*255)},0.7)`;
    ctx.beginPath();
    ctx.arc(px,py,r,0,Math.PI*2);
    ctx.fill();
    if(selectedCode===code){
      ctx.strokeStyle='rgba(255,255,255,0.9)';
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.arc(px,py,r+4,0,Math.PI*2);
      ctx.stroke();
      ctx.strokeStyle='rgba(255,255,255,0.4)';
      ctx.lineWidth=4;
      ctx.beginPath();
      ctx.arc(px,py,r+8,0,Math.PI*2);
      ctx.stroke();
    }
    ctx.fillStyle='#fff';
    ctx.font='9px Arial';
    ctx.textAlign='center';
    ctx.fillText(code,px,py+3);
  }
}


function meshBelongsToSelected(it){
  if(!selectedCode)return true;
  return N(it.bind)===selectedCode || N(it.name)===selectedCode || N(it.meshName)===selectedCode || N(it.name).includes(selectedCode) || N(it.meshName).includes(selectedCode);
}

function hasSelectedMesh(){
  if(!selectedCode)return false;
  return meshes.some(meshBelongsToSelected);
}

function selectDevice(code){
  selectedCode=N(code);
  buildDetail(selectedCode);
  buildDeviceList();
  centerCamera();
}

function centerCamera(){
  if(!selectedCode)return;
  let box=bindBoxes[selectedCode];
  if(!box)return;
  let cx=(box.min[0]+box.max[0])/2,cy=(box.min[1]+box.max[1])/2,cz=(box.min[2]+box.max[2])/2;
  let sx=box.max[0]-box.min[0],sy=box.max[1]-box.min[1],sz=box.max[2]-box.min[2];
  let maxDim=Math.max(sx,sy,sz);
  cam.dist=maxDim*2.5;
  cam.pan=[cx-B.cen[0],cy-B.cen[1],cz-B.cen[2]];
}

function goBack(){
  try{sessionStorage.setItem('twin_detail_back_request',String(Date.now()))}catch(e){}
  let embedded=new URLSearchParams(window.location.search).get('embedded');
  if(embedded==='cef'){window.location.href='twinapp://main';return;}
  if(window.history.length>1){window.history.back();return;}
  window.location.replace('twin_viewer.html?restore=1');
}

function resize(){
  let r=window.devicePixelRatio||1,w=c.clientWidth*r,h=c.clientHeight*r;
  if(c.width!=w||c.height!=h){c.width=w;c.height=h}
  let mm=document.getElementById('minimap');
  if(mm){let r2=window.devicePixelRatio||1;mm.width=mm.clientWidth*r2;mm.height=mm.clientHeight*r2;updateMinimap()}
}

function draw(){
  requestAnimationFrame(draw);
  resize();
  gl.viewport(0,0,c.width,c.height);
  gl.clearColor(0.03,0.06,0.10,1);
  gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
  let r=cam.dist,cp=Math.cos(cam.pitch),eye=[B.cen[0]+cam.pan[0]+r*cp*Math.sin(cam.yaw),B.cen[1]+cam.pan[1]+r*Math.sin(cam.pitch),B.cen[2]+cam.pan[2]+r*cp*Math.cos(cam.yaw)],view=LA(eye,[B.cen[0]+cam.pan[0],B.cen[1]+cam.pan[1],B.cen[2]+cam.pan[2]],[0,1,0]),proj=P(Math.PI/4,c.width/c.height,Math.max(0.01,B.r/1000),B.r*100+100);
  let ap=gl.getAttribLocation(prog,'p'),an=gl.getAttribLocation(prog,'n'),auv=gl.getAttribLocation(prog,'uv'),um=gl.getUniformLocation(prog,'mvp'),umo=gl.getUniformLocation(prog,'mo'),uc=gl.getUniformLocation(prog,'color'),usc=gl.getUniformLocation(prog,'statusColor'),usa=gl.getUniformLocation(prog,'statusAlpha'),up=gl.getUniformLocation(prog,'pulse'),uum=gl.getUniformLocation(prog,'useMap'),ue=gl.getUniformLocation(prog,'exposure'),utex=gl.getUniformLocation(prog,'tex'),uenv=gl.getUniformLocation(prog,'envTex'),uuse=gl.getUniformLocation(prog,'useEnv'),umet=gl.getUniformLocation(prog,'metallic'),urgh=gl.getUniformLocation(prog,'roughness'),uem=gl.getUniformLocation(prog,'emissive'),ual=gl.getUniformLocation(prog,'alpha'),uop=gl.getUniformLocation(prog,'outlinePass'),uoc=gl.getUniformLocation(prog,'outlineColor'),uot=gl.getUniformLocation(prog,'outlineThickness');
  gl.uniform1i(utex,0);
  gl.uniform1i(uenv,1);
  const selectedMeshExists=hasSelectedMesh();
  for(const it of meshes){
    let isSelected=selectedCode&&meshBelongsToSelected(it);
    // 详情页中心画布只绘制当前选择的设备；全站位置由左侧微缩图负责展示。
    if(selectedCode&&selectedMeshExists&&!isSelected)continue;
    let st=match(it.name,it.bind),scol=st?col(st):[0,0,0],salpha=0;
    if(st){salpha=(st==='fault'?0.022:(st==='running'?0.0:(st==='maintenance'?0.010:0.002)))}
    let alphaVal=(it.alpha==null?1:it.alpha);
    let pulse=(isSelected?0.10:(st==='fault'?(Math.sin(Date.now()/360)+1)/2*0.10:0)),mvp=MM(proj,MM(view,it.model));
    gl.uniformMatrix4fv(um,false,new Float32Array(mvp));
    gl.uniformMatrix4fv(umo,false,new Float32Array(it.model));
    gl.uniform3fv(uc,new Float32Array(it.color));
    gl.uniform3fv(usc,new Float32Array(scol));
    gl.uniform1f(usa,salpha);
    gl.uniform1f(up,pulse);
    gl.uniform1f(uum,it.texture?1:0);
    gl.uniform1f(ue,1.06);
    gl.uniform1f(umet,it.metallic||0);
    gl.uniform1f(urgh,it.roughness==null?0.5:it.roughness);
    gl.uniform3fv(uem,new Float32Array(it.emissive||[0,0,0]));
    gl.uniform1f(ual,alphaVal);
    gl.uniform1f(uop,0);
    gl.uniform1f(uot,0);
    gl.uniform3fv(uoc,new Float32Array(scol));
    gl.uniform1f(uuse,0);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D,it.texture||solidTex());
    gl.bindBuffer(gl.ARRAY_BUFFER,it.v);gl.enableVertexAttribArray(ap);gl.vertexAttribPointer(ap,3,gl.FLOAT,false,0,0);
    gl.bindBuffer(gl.ARRAY_BUFFER,it.n);gl.enableVertexAttribArray(an);gl.vertexAttribPointer(an,3,gl.FLOAT,false,0,0);
    gl.bindBuffer(gl.ARRAY_BUFFER,it.u);gl.enableVertexAttribArray(auv);gl.vertexAttribPointer(auv,2,gl.FLOAT,false,0,0);
    let issue=()=>{if(it.indexed){gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,it.i);gl.drawElements(gl.TRIANGLES,it.count,gl.UNSIGNED_INT,0)}else gl.drawArrays(gl.TRIANGLES,0,it.count)};
    issue();
    if(isSelected){
      gl.uniform1f(uop,1);
      gl.uniform1f(uot,Math.max(B.r*0.004,cam.dist*0.006));
      gl.uniform3fv(uoc,new Float32Array([1,1,1]));
      gl.depthFunc(gl.LEQUAL);
      issue();
      gl.depthFunc(gl.LESS);
      gl.uniform1f(uop,0);
    }
  }
}

async function loadState(){
  try{
    let r=await fetch('twin_state.json?ts='+Date.now(),{cache:'no-store'});
    state=await r.json();
    state._clientReadAt=Date.now();
    if(selectedCode)buildDetail(selectedCode);
    buildDeviceList();
    updateMinimap();
  }catch(e){console.warn(e)}
}

function getUrlParam(name){
  let url=new URL(window.location.href);
  return url.searchParams.get(name);
}

(async()=>{
  try{
    init();
    let g=await load();
    build(g);
    selectedCode=N(getUrlParam('code')||getUrlParam('device')||'');
    if(selectedCode){centerCamera();buildDetail(selectedCode)}
    buildDeviceList();
    updateMinimap();
    hide();
    await loadState();
    setInterval(loadState,1000);
    draw();
  }catch(e){console.error(e);show('<span class="err">加载失败：</span>'+(e.message||e))}
})();

c.oncontextmenu=e=>e.preventDefault();
c.onmousedown=e=>{drag=true;last=[e.clientX,e.clientY];btn=e.button};
window.onmouseup=()=>drag=false;
window.onmousemove=e=>{
  if(!drag)return;
  let dx=e.clientX-last[0],dy=e.clientY-last[1];
  last=[e.clientX,e.clientY];
  if(btn==2||btn==1){let s=B.r/350;cam.pan[0]+=dx*s;cam.pan[1]-=dy*s}else{cam.yaw+=dx*0.008;cam.pitch=Math.max(-1.45,Math.min(1.45,cam.pitch+dy*0.006))}
};
c.onwheel=e=>{e.preventDefault();cam.dist*=e.deltaY>0?1.12:0.89;cam.dist=Math.max(B.r*0.25,cam.dist)};
</script></body></html>
